# DiT-XL/2 Training Configuration
# ImageNet 256x256 Class-Conditional Image Generation

# Environment settings
env:
  mode: 0                    # 0: PYNTIVE_MODE, 1: GRAPH_MODE
  device: "CPU"          # "Ascend", "GPU", "CPU"
  distributed: false         # Enable distributed training
  seed: 42
  dtype: "fp32"              # "fp32", "fp16", "bf16"

# Data settings
data:
  dataset_path: "/home/ubuntu/.cache/imagenetmini/imagenet-mini"    # ImageNet root path (train/val folders with class subdirs)
  latent_path: null                     # Pre-computed VAE latents path (optional, for faster training)
  image_size: 256
  num_classes: 1000
  batch_size: 16
  num_workers: 8
  shuffle: true
  drop_remainder: true
  prefetch_size: 16

# Model settings
model:
  model_type: "DiT-XL/2"                # Model variant: DiT-XL/2, DiT-L/2, DiT-B/2, DiT-S/2
  vae_model: "stabilityai/sd-vae-ft-mse"  # VAE model path or identifier
  latent_channels: 4
  patch_size: 2
  hidden_size: 1152                     # DiT-XL: 1152
  num_layers: 28                        # DiT-XL: 28
  num_heads: 16
  head_dim: 72
  class_dropout_prob: 0.1               # Classifier-free guidance probability
  enable_gradient_checkpointing: false

# Training settings
train:
  output_path: "./output/dit_xl2"        # Output directory
  resume_ckpt: null                     # Resume from checkpoint path
  
  # Optimizer
  optimizer:
    type: "adamw"
    lr: 1.0e-4
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
  
  # Learning rate scheduler
  scheduler:
    type: "cosine"                      # "cosine", "constant", "linear"
    warmup_steps: 1000
    min_lr: 1.0e-6
  
  # Training hyperparameters
  num_epochs: 100
  gradient_accumulation: 1
  max_grad_norm: 1.0
  
  # EMA settings
  ema:
    enable: true
    decay: 0.9999
    update_interval: 1
  
  # Logging
  log_interval: 50
  save_checkpoint_steps: 5000
  save_checkpoint_total_limit: 5

# VAE settings
vae:
  tiling: false                         # Enable VAE tiling for large images
  scaling_factor: 0.18215              # SD-VAE scaling factor

# Scheduler settings (for training noise schedule)
scheduler:
  type: "ddpm"                          # "ddpm", "ddim", "flow_matching"
  beta_start: 0.0001
  beta_end: 0.02
  beta_schedule: "linear"               # "linear", "scaled_linear", "squaredcos_cap_v2"
  num_train_timesteps: 1000
  clip_sample: false
